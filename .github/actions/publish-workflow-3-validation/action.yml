name: Publish Workflow / Validation
description: It runs pre-publish checks

inputs:
  package_name:
    description: package's name
    required: true

runs:
  using: composite
  steps:
    - name: Run linters
      run: yarn run lint
      shell: bash

    - name: Run build
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
      run: yarn workspace "$PACKAGE_NAME" run build
      shell: bash

    - name: Run tests and linters
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
      run: yarn workspace "$PACKAGE_NAME" run test
      shell: bash
