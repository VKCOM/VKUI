name: Publish Workflow / Bump version
description: It bump version of provided package

inputs:
  package_name:
    description: Package's name
    required: true
  version_type:
    description: <custom> | major | minor | patch | premajor | preminor | prepatch | prerelease
    required: true
  prerelease_id:
    description: Prerelease identifier
    required: false

outputs:
  prev_version:
    description: Previous version before bump
    value: ${{ steps.internal_id_prev_version.outputs.value }}
  next_version:
    description: New version after bump
    value: ${{ steps.internal_id_next_version.outputs.value }}
  is_stable_release:
    description: Whether the release is stable (not a prerelease)
    value: ${{ steps.internal_id_is_stable_release.outputs.value }}

runs:
  using: composite
  steps:
    - name: Saving current version to env
      id: internal_id_prev_version
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
      run: |
        VERSION="$(yarn workspace "$PACKAGE_NAME" node -p "require('./package.json').version")"
        printf 'value=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Bump ${{ inputs.package_name }} package by version type
      if: ${{ !inputs.prerelease_id }}
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION_TYPE: ${{ inputs.version_type }}
      run: yarn workspace "$PACKAGE_NAME" run g:npm:version "$VERSION_TYPE"
      shell: bash

    - name: Bump ${{ inputs.package_name }} package by version type (with --preid flag)
      if: ${{ inputs.prerelease_id }}
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION_TYPE: ${{ inputs.version_type }}
        PRERELEASE_ID: ${{ inputs.prerelease_id }}
      run: yarn workspace "$PACKAGE_NAME" run g:npm:version "$VERSION_TYPE" --preid "$PRERELEASE_ID"
      shell: bash

    - name: Saving new version to env
      id: internal_id_next_version
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
      run: |
        VERSION="$(yarn workspace "$PACKAGE_NAME" node -p "require('./package.json').version")"
        printf 'value=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Detect release type
      id: internal_id_is_stable_release
      env:
        NEXT_VERSION: ${{ steps.internal_id_next_version.outputs.value }}
      run: |
        if node --run semver -- "$NEXT_VERSION" --range '>=0.0.0'; then
          echo "value=true" >> "$GITHUB_OUTPUT"
        else
          echo "value=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
