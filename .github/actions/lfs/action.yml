name: Workflow / Checkout LFS objects
description: Get lfs from cache

inputs:
  apt_mirror:
    description: apt mirror
  sudo_cmd:
    description: Command prefix for privileged operations
    default: sudo

runs:
  using: composite
  steps:
    - name: Validate sudo_cmd
      shell: bash
      env:
        SUDO_CMD: ${{ inputs.sudo_cmd }}
      run: |
        case "$SUDO_CMD" in
          ""|"sudo") ;;
          *)
            echo "::error::Unsupported sudo_cmd value"
            exit 1
            ;;
        esac

    # см. https://github.com/actions/checkout/issues/1169
    - name: Set safe directory
      shell: bash
      run: git config --global --add safe.directory /__w/VKUI/VKUI

    - name: Configure apt mirror
      if: ${{ inputs.apt_mirror }}
      shell: bash
      env:
        APT_MIRROR: ${{ inputs.apt_mirror }}
        SUDO_CMD: ${{ inputs.sudo_cmd }}
      run: |
        $SUDO_CMD sed -i "s|http://archive.ubuntu.com|$APT_MIRROR|g" /etc/apt/sources.list
        $SUDO_CMD sed -i "s|http://security.ubuntu.com|$APT_MIRROR|g" /etc/apt/sources.list
        $SUDO_CMD apt-get update

    # Скачивание git-lfs через curl это ожидаемое решение.
    # см. https://github.com/microsoft/playwright/issues/21920
    - name: Install git lfs
      shell: bash
      env:
        SUDO_CMD: ${{ inputs.sudo_cmd }}
      run: |
        if command -v git-lfs > /dev/null 2>&1 ; then
          echo "git-lfs installed"
        else
          curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | $SUDO_CMD bash
          $SUDO_CMD apt-get install -y git-lfs
        fi

    # см. https://github.com/actions/cache/issues/1455
    - name: Install zstd
      shell: bash
      env:
        SUDO_CMD: ${{ inputs.sudo_cmd }}
      run: |
        if command -v zstd > /dev/null 2>&1 ; then
          echo "zstd installed"
        else
          $SUDO_CMD apt-get install -y zstd
        fi

    - name: Create LFS file list
      shell: bash
      run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

    - name: Restore LFS cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .git/lfs
        key: lfs-${{ hashFiles('.lfs-assets-id') }}
        enableCrossOsArchive: 'true'

    - name: Checkout LFS objects
      shell: bash
      run: git lfs pull
