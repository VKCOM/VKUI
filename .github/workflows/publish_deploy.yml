name: 'Publish: Deploy (⚠️ use manually call only if necessary)'
# Note: display_title не задокументирован из-за чего в IDE может подчёркиваться строка
run-name: "${{ github.event_name == 'workflow_run' && format('{0}: Deploy • {1} • {2}', github.event.workflow_run.display_title, github.event.workflow_run.head_branch, github.event.workflow_run.id) || format('Publish {0} {1}@{2}: Deploy (⚠️ manually run)', inputs.publish_type, inputs.package_name, inputs.next_version) }}"

on:
  workflow_run:
    workflows: ['Publish pre-release', 'Publish release']
    types: [completed]
  # Note: только на случай, если потребуется ручной запуск
  workflow_dispatch:
    inputs:
      package_name:
        description: "package's name:"
        required: true
        type: choice
        options:
          - '@vkontakte/vkui'
      next_version:
        description: "package's version (without 'v'):"
        required: true
        type: string
      publish_type:
        description: "⚠️ before change to 'release' make sure this is the case"
        default: 'pre-release'
        type: choice
        options:
          - 'release'
          - 'pre-release'

env:
  CHECKOUT_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

permissions:
  contents: read

jobs:
  payload:
    name: Prepare payload data
    runs-on: ubuntu-slim
    outputs:
      package_name: ${{ steps.publish_workflow_payload.outputs.package_name || steps.manual_payload.outputs.package_name }}
      next_version: ${{ steps.publish_workflow_payload.outputs.next_version || steps.manual_payload.outputs.next_version }}
      is_for_prerelease: ${{ contains(github.event.workflow_run.name, 'Publish pre-release') || contains(inputs.publish_type, 'pre-release') }}
    steps:
      - name: Download artifact (if it is 'workflow_run')
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'workflow_dispatch' && github.event.workflow_run.conclusion == 'success' }}
        id: artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}
          name: publish_workflow_payload
          path: publish_workflow_payload/
          run-id: ${{ github.event.workflow_run.id }}

      - name: Parse artifact
        if: ${{ steps.artifact.conclusion == 'success' }}
        id: publish_workflow_payload
        shell: bash
        run: |
          PACKAGE_NAME="$(tr -d '\r\n' < publish_workflow_payload/package_name.txt)"
          NEXT_VERSION="$(tr -d '\r\n' < publish_workflow_payload/next_version.txt)"

          case "$PACKAGE_NAME" in
            "@vkontakte/vkui"|"@vkontakte/vkui-floating-ui"|"@vkontakte/vkui-date-fns-tz"|"@vkontakte/vkui-codemods"|"@vkontakte/vkui-mcp") ;;
            *)
              echo "::error::Invalid package_name payload"
              exit 1
              ;;
          esac

          if [[ ! "$NEXT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid next_version payload"
            exit 1
          fi

          {
            printf 'package_name=%s\n' "$PACKAGE_NAME"
            printf 'next_version=%s\n' "$NEXT_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Validate manual payload
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: manual_payload
        shell: bash
        env:
          NEXT_VERSION: ${{ inputs.next_version }}
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          case "$PACKAGE_NAME" in
            "@vkontakte/vkui") ;;
            *)
              echo "::error::Invalid package_name input"
              exit 1
              ;;
          esac

          if [[ ! "$NEXT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid next_version input"
            exit 1
          fi

          {
            printf 'package_name=%s\n' "$PACKAGE_NAME"
            printf 'next_version=%s\n' "$NEXT_VERSION"
          } >> "$GITHUB_OUTPUT"

  deploy_vkui_docs:
    needs: [payload]
    if: ${{ success() && needs.payload.outputs.package_name == '@vkontakte/vkui' && needs.payload.outputs.next_version }}
    runs-on: ubuntu-latest
    name: Deploy @vkontakte/vkui docs
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.CHECKOUT_BRANCH }}

      - name: Setting up the repository environment
        uses: ./.github/actions/setup

      - name: Build vkui package
        run: yarn run build:vkui

      - name: Build storybook
        run: yarn docs:storybook:build -o ../../website/tmp/playground

      - name: Creating docs for release (default basePath)
        if: ${{ fromJSON(needs.payload.outputs.is_for_prerelease) != true }}
        # [Latest doc] В S3 будет выгружать с префиксом latest (cм. 86 строчку)
        run: |
          yarn run docs:website:build
          yarn workspace @project-docs/website run next-sitemap

          cp -R website/out/* website/tmp/

          mkdir -p website/out/playground
          cp -R website/tmp/playground/* website/out/playground/

      - name: Creating docs for pre-release OR release (version basePath)
        # [Version doc] В S3 будет выгружать с префиксом <version>
        env:
          DOCS_VERSION: ${{ needs.payload.outputs.next_version }}
          NEXT_PUBLIC_VKUI_DOCS_BASE_PATH: /${{ needs.payload.outputs.next_version }}
          NEXT_PUBLIC_VKUI_DOCS_DIST_DIR: out/${{ needs.payload.outputs.next_version }}
        run: |
          yarn run docs:website:build
          mkdir -p "website/out/${DOCS_VERSION}/playground"
          cp -R website/tmp/playground/* "website/out/${DOCS_VERSION}/playground/"

      - name: Publishing doc
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}
          branch: gh-pages
          folder: website/out
          clean: false
          force: false

      - name: Latest doc • Delete old data
        if: ${{ fromJSON(needs.payload.outputs.is_for_prerelease) != true }}
        uses: VKCOM/gh-actions/VKUI/s3@main
        with:
          awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
          awsSecretAccessKey: ${{ secrets.AWS_SECRET_KEY }}
          awsBucket: ${{ vars.AWS_BUCKET_WEBSITE }}
          awsEndpoint: https://${{ vars.AWS_ENDPOINT }}
          command: delete
          commandDeletePrefix: latest/

      - name: Latest doc • Upload new data
        if: ${{ fromJSON(needs.payload.outputs.is_for_prerelease) != true }}
        uses: VKCOM/gh-actions/VKUI/s3@main
        with:
          awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
          awsSecretAccessKey: ${{ secrets.AWS_SECRET_KEY }}
          awsBucket: ${{ vars.AWS_BUCKET_WEBSITE }}
          awsEndpoint: https://${{ vars.AWS_ENDPOINT }}
          command: upload
          commandUploadSrc: website/tmp/
          commandUploadDist: latest

      - name: Version doc • Upload
        uses: VKCOM/gh-actions/VKUI/s3@main
        with:
          awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
          awsSecretAccessKey: ${{ secrets.AWS_SECRET_KEY }}
          awsBucket: ${{ vars.AWS_BUCKET_WEBSITE }}
          awsEndpoint: https://${{ vars.AWS_ENDPOINT }}
          command: upload
          commandUploadSrc: website/out/${{ needs.payload.outputs.next_version }}/
          commandUploadDist: ${{ needs.payload.outputs.next_version }}

  deploy_mcp_data:
    needs: [payload]
    if: ${{ success() && needs.payload.outputs.package_name == '@vkontakte/vkui' && needs.payload.outputs.next_version }}
    runs-on: ubuntu-latest
    name: Deploy MCP data
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.CHECKOUT_BRANCH }}

      - name: Setting up the repository environment
        uses: ./.github/actions/setup

      - name: Build vkui package
        run: yarn run build:vkui

      - name: Generate docgen
        run: yarn workspace @project-docs/website run generate

      - name: Generate MCP data
        run: node website/scripts/generate-mcp-data.mjs

      - name: Upload MCP data to S3 in version folder
        uses: VKCOM/gh-actions/VKUI/s3@main
        with:
          awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
          awsSecretAccessKey: ${{ secrets.AWS_SECRET_KEY }}
          awsBucket: ${{ vars.AWS_BUCKET_MCP }}
          awsEndpoint: https://${{ vars.AWS_ENDPOINT }}
          command: upload
          commandUploadSrc: mcp-data/
          commandUploadDist: ${{ needs.payload.outputs.next_version }}

      - name: Upload MCP data to S3 in latest folder
        uses: VKCOM/gh-actions/VKUI/s3@main
        with:
          awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
          awsSecretAccessKey: ${{ secrets.AWS_SECRET_KEY }}
          awsBucket: ${{ vars.AWS_BUCKET_MCP }}
          awsEndpoint: https://${{ vars.AWS_ENDPOINT }}
          command: upload
          commandUploadSrc: mcp-data/
          commandUploadDist: latest
