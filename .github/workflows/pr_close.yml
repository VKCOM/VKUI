name: 'Close Pull Request'

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number_by_workflow_dispatch:
        description: 'Number of PR'
        type: number
        required: true

permissions:
  contents: read

jobs:
  upload_pr_workflow_payload:
    # Не используем always(), т.к. он не учитывает отмену воркфлоу
    # см. https://github.com/orgs/community/discussions/26303
    if: ${{ !cancelled() }}
    name: Call reusable workflow
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/reusable_workflow_pr_worfklow_payload.yml
    with:
      action: upload
      override_pr_number: ${{ inputs.pr_number_by_workflow_dispatch }}

  v7:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'ci:cherry-pick:v7')
    concurrency: ci-stable
    runs-on: ubuntu-slim
    name: v7 Patch
    steps:
      - name: Checkout (for forked PR)
        if: github.event.pull_request.base.repo.id != github.event.pull_request.head.repo.id
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Checkout (for maintainer's PR)
        if: github.event.pull_request.base.repo.id == github.event.pull_request.head.repo.id
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}

      - name: Enable Corepack
        run: corepack enable
        shell: bash

      - name: Setup NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Set Git credentials
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"

      - name: Make patch
        uses: VKCOM/gh-actions/VKUI/patch@main
        with:
          token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}
          directory: packages/vkui/
          targetBranch: v7
          needScreenshots: true

  patch:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'ci:cherry-pick:patch')
    concurrency: ci-stable
    runs-on: ubuntu-slim
    name: Stable Patch
    steps:
      - name: Checkout (for forked PR)
        if: github.event.pull_request.base.repo.id != github.event.pull_request.head.repo.id
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Checkout (for maintainer's PR)
        if: github.event.pull_request.base.repo.id == github.event.pull_request.head.repo.id
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}

      - name: Enable Corepack
        run: corepack enable
        shell: bash

      - name: Setup NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Set Git credentials
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"

      - name: Make patch
        uses: VKCOM/gh-actions/VKUI/patch@main
        with:
          token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}
          directory: packages/vkui/

  v7-patch:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'ci:cherry-pick:v7-patch')
    concurrency: ci-stable
    runs-on: ubuntu-slim
    name: v7 Stable Patch
    steps:
      - name: Checkout (for forked PR)
        if: github.event.pull_request.base.repo.id != github.event.pull_request.head.repo.id
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Checkout (for maintainer's PR)
        if: github.event.pull_request.base.repo.id == github.event.pull_request.head.repo.id
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}

      - name: Fetch v7 branch
        run: git fetch origin v7

      - name: Get minor version from v7
        id: get_minor_version
        run: |
          MINOR_VERSION=$(git show origin/v7:packages/vkui/package.json | jq -r '.version|split(".")[1]')
          echo "minor=${MINOR_VERSION}" >> "$GITHUB_OUTPUT"
          echo "target_branch=7.${MINOR_VERSION}-stable" >> "$GITHUB_OUTPUT"

      - name: Enable Corepack
        run: corepack enable
        shell: bash

      - name: Setup NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Set Git credentials
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"

      - name: Make patch
        uses: VKCOM/gh-actions/VKUI/patch@main
        with:
          token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}
          directory: packages/vkui/
          targetBranch: ${{ steps.get_minor_version.outputs.target_branch }}
          needScreenshots: true

  is-updated-vkui-floating-ui:
    runs-on: ubuntu-slim
    if: ${{ github.event.pull_request.merged == true
      && github.event.pull_request.user.login == 'dependabot[bot]'
      && github.event.pull_request.base.ref == 'master' }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      result: ${{ steps.check_floating_ui_updated.outputs.floating_ui_updated }}
      prev_floating_ui_version: ${{ steps.check_floating_ui_updated.outputs.prev_version }}
      new_floating_ui_version: ${{ steps.check_floating_ui_updated.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Node setup
        uses: ./.github/actions/node-setup

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: file_changes
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            vkui_floating_ui_package:
              - 'packages/vkui-floating-ui/package.json'

      - name: Check if vkui-floating-ui was updated
        id: check_floating_ui_updated
        if: ${{ steps.file_changes.outputs.vkui_floating_ui_package == 'true' }}
        env:
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          PREVIOUS_VERSION: ${{ steps.metadata.outputs.previous-version }}
        run: |
          UPDATED_DEPS="${DEPENDENCY_NAMES//,/ }"

          if [[ "$UPDATED_DEPS" == *"@floating-ui/react-dom"* ]]; then
            {
              echo "floating_ui_updated=true"
              printf 'prev_version=%s\n' "$PREVIOUS_VERSION"
              printf 'new_version=%s\n' "$NEW_VERSION"
            } >> "$GITHUB_OUTPUT"
          else
            echo "floating_ui_updated=false" >> "$GITHUB_OUTPUT"
          fi

  autopublish-vkui-floating-ui:
    runs-on: ubuntu-slim
    needs: is-updated-vkui-floating-ui
    if: ${{ needs.is-updated-vkui-floating-ui.outputs.result == 'true' }}
    permissions:
      issues: write
      pull-requests: write
      contents: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Node setup
        uses: ./.github/actions/node-setup

      - name: Get vkui-floating-ui version
        id: get_version
        run: |
          VERSION="$(node -p "require('./packages/vkui-floating-ui/package.json').version")"
          printf 'floating_ui_version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      # Рассчитываем новую версию @vkui-floating-ui
      - name: Calculate new version of vkui-floating-ui
        id: calc_new_version_vkui_floating_ui
        uses: VKCOM/gh-actions/VKUI/bump-vkui-floating-ui-version@main
        with:
          prev_origin_version: ${{ needs.is-updated-vkui-floating-ui.outputs.prev_floating_ui_version }}
          new_origin_version: ${{ needs.is-updated-vkui-floating-ui.outputs.new_floating_ui_version }}
          current_version: ${{ steps.get_version.outputs.floating_ui_version }}

      - name: Define branch name for new version release
        id: release_branch
        env:
          NEW_VERSION: ${{ steps.calc_new_version_vkui_floating_ui.outputs.new_version }}
        run: |
          BRANCH_NAME_PREFIX="release/vkui-floating-ui-"
          printf 'name=%s%s\n' "$BRANCH_NAME_PREFIX" "$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set Git credentials
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"

      - name: Create branch for new version release
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1.3.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.release_branch.outputs.name }}

      # Запускаем форкфлоу скрипта публикации
      # В `publish.yml` поле `version_type` помечено как `required` и, чтобы избежать ошибок, стоит проставить.
      # Значение этого поля не важно, так как оно будет проигнорировано из-за поля `custom_version`
      - name: Publish new version
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          NEW_VERSION: ${{ steps.calc_new_version_vkui_floating_ui.outputs.new_version }}
          RELEASE_BRANCH_NAME: ${{ steps.release_branch.outputs.name }}
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish.yml',
              ref: process.env.RELEASE_BRANCH_NAME,
              inputs: {
                package_name: '@vkontakte/vkui-floating-ui',
                custom_version: process.env.NEW_VERSION,
                version_type: 'patch',
                close_milestone: false
              }
            })

  update-release-notes:
    if: ${{ github.event.pull_request.merged == true
      && github.event.pull_request.base.ref == 'master'}}
    runs-on: ubuntu-slim
    name: Update release notes
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Get vkui version
        id: get_version
        run: |
          VERSION="$(node -p "require('./packages/vkui/package.json').version")"
          printf 'vkui_version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update release notes script
        uses: VKCOM/gh-actions/VKUI/auto-update-release-notes@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull_request_number: ${{ github.event.pull_request.number }}
