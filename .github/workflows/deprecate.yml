name: 'Deprecate package'

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'package name'
        type: choice
        options:
          - '@vkontakte/vkui'
          - '@vkontakte/vkui-floating-ui'
          - '@vkontakte/vkui-date-fns-tz'
        required: true
      version:
        description: 'type version: x.y.z (without "v")'
        required: true
      reason:
        description: 'reason for deprecation (only latin supported)'
        required: true

run-name: Deprecate version ${{ inputs.version }}

jobs:
  deprecate:
    runs-on: ubuntu-slim
    steps:
      - name: Enable Corepack
        run: corepack enable
        shell: bash

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Deprecate version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_PUBLISH_TOKEN }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          REASON: ${{ inputs.reason }}
          VERSION: ${{ inputs.version }}
        run: |
          SEMVER_RE='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?$'

          if [[ ! "$VERSION" =~ $SEMVER_RE ]]; then
            echo "::error::Invalid semver version"
            exit 1
          fi

          npm deprecate "${PACKAGE_NAME}@${VERSION}" "$REASON"
