name: 'Reusable workflow / Unit tests'

on:
  workflow_call:
    inputs:
      ref:
        description: 'The branch, tag or SHA to checkout'
        default: ${{ github.ref }}
        required: false
        type: string
      workspace:
        description: 'Workspace to run tests in (if empty, runs tests for all workspaces)'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run unit tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Node setup
        uses: ./.github/actions/node-setup

      - name: Run tests for all workspaces
        if: ${{ !inputs.workspace }}
        run: yarn run test:ci

      - name: Run tests for the specified workspace
        if: ${{ inputs.workspace }}
        run: yarn workspace ${{ inputs.workspace }} run test:ci

      - name: Upload test artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-output
          path: |
            test-results.json
            .nyc_output/coverage-final.json
