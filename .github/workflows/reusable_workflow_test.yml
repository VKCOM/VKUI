name: 'Reusable workflow / Unit tests'

on:
  workflow_call:
    inputs:
      ref:
        description: 'The branch, tag or SHA to checkout'
        default: ${{ github.ref }}
        required: false
        type: string
      workspace:
        description: 'Workspace to run tests in (if empty, runs tests for all workspaces)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run unit tests
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref }}

      - name: Node setup
        uses: ./.github/actions/node-setup

      - name: Run tests for all workspaces
        if: ${{ !inputs.workspace }}
        run: node --run test:ci

      - name: Run tests for the specified workspace
        if: ${{ inputs.workspace }}
        env:
          WORKSPACE: ${{ inputs.workspace }}
        run: yarn workspace "$WORKSPACE" run test:ci

      - name: Upload test artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-output
          path: |
            test-results.json
            .nyc_output/coverage-final.json
            .nyc_output/cobertura-coverage.xml
