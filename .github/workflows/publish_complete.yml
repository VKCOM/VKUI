name: 'Publish: Complete (⚠️ use manually call only if necessary)'
# Note: display_title не задокументирован из-за чего в IDE может подчёркиваться строка
run-name: "${{ github.event_name == 'workflow_run' && format('{0}: Complete • {1} • {2}', github.event.workflow_run.display_title, github.event.workflow_run.head_branch, github.event.workflow_run.id) || format('Publish {0} {1} ({2}): Complete (⚠️ manually run)', inputs.package_name, inputs.git_release_tag, inputs.npm_tag) }}"

on:
  workflow_run:
    workflows: ['Publish release']
    types: [completed]
  # Note: только на случай, если потребуется ручной запуск
  workflow_dispatch:
    inputs:
      package_name:
        description: "package's name:"
        required: true
        type: choice
        options:
          - '@vkontakte/vkui'
          - '@vkontakte/vkui-floating-ui'
      git_release_tag:
        description: 'git release tag (ex: `v6.0.0`):'
        required: true
        type: string
      npm_tag:
        description: 'npm tag:'
        required: true
        type: choice
        options:
          - 'latest'
          - 'legacy'

permissions:
  contents: read

jobs:
  payload:
    name: Prepare payload data
    runs-on: ubuntu-slim
    outputs:
      package_name: ${{ steps.publish_workflow_payload.outputs.package_name || steps.manual_payload.outputs.package_name }}
      npm_tag: ${{ steps.publish_workflow_payload.outputs.npm_tag || steps.manual_payload.outputs.npm_tag }}
      git_release_tag: ${{ steps.publish_workflow_payload.outputs.git_release_tag || steps.manual_payload.outputs.git_release_tag }}
      close_milestone: ${{ steps.publish_workflow_payload.outputs.close_milestone || steps.manual_payload.outputs.close_milestone || 'false' }}
      branch: ${{ steps.publish_workflow_payload.outputs.branch || steps.manual_payload.outputs.branch }}
    steps:
      - name: Download artifact (if it is 'workflow_run')
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'workflow_dispatch' && github.event.workflow_run.conclusion == 'success' }}
        id: artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}
          name: publish_workflow_payload
          path: publish_workflow_payload/
          run-id: ${{ github.event.workflow_run.id }}

      - name: Parse artifact
        if: ${{ steps.artifact.conclusion == 'success' }}
        id: publish_workflow_payload
        shell: bash
        run: |
          PACKAGE_NAME="$(tr -d '\r\n' < publish_workflow_payload/package_name.txt)"
          NPM_TAG="$(tr -d '\r\n' < publish_workflow_payload/npm_tag.txt)"
          GIT_RELEASE_TAG="$(tr -d '\r\n' < publish_workflow_payload/git_release_tag.txt)"
          CLOSE_MILESTONE="$(tr -d '\r\n' < publish_workflow_payload/close_milestone.txt)"
          BRANCH="$(tr -d '\r\n' < publish_workflow_payload/branch.txt)"

          case "$PACKAGE_NAME" in
            "@vkontakte/vkui"|"@vkontakte/vkui-floating-ui"|"@vkontakte/vkui-date-fns-tz"|"@vkontakte/vkui-codemods"|"@vkontakte/vkui-mcp") ;;
            *)
              echo "::error::Invalid package_name payload"
              exit 1
              ;;
          esac

          if [[ ! "$NPM_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid npm_tag payload"
            exit 1
          fi

          if [[ ! "$GIT_RELEASE_TAG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?|@vkontakte/[A-Za-z0-9._-]+@[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?)$ ]]; then
            echo "::error::Invalid git_release_tag payload"
            exit 1
          fi

          if [[ "$CLOSE_MILESTONE" != "true" && "$CLOSE_MILESTONE" != "false" ]]; then
            echo "::error::Invalid close_milestone payload"
            exit 1
          fi

          if [[ ! "$BRANCH" =~ ^(refs/heads/)?[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Invalid branch payload"
            exit 1
          fi

          {
            printf 'package_name=%s\n' "$PACKAGE_NAME"
            printf 'npm_tag=%s\n' "$NPM_TAG"
            printf 'git_release_tag=%s\n' "$GIT_RELEASE_TAG"
            printf 'close_milestone=%s\n' "$CLOSE_MILESTONE"
            printf 'branch=%s\n' "$BRANCH"
          } >> "$GITHUB_OUTPUT"

      - name: Validate manual payload
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: manual_payload
        shell: bash
        env:
          BRANCH: ${{ github.ref }}
          GIT_RELEASE_TAG: ${{ inputs.git_release_tag }}
          NPM_TAG: ${{ inputs.npm_tag }}
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          case "$PACKAGE_NAME" in
            "@vkontakte/vkui"|"@vkontakte/vkui-floating-ui") ;;
            *)
              echo "::error::Invalid package_name input"
              exit 1
              ;;
          esac

          if [[ ! "$NPM_TAG" =~ ^(latest|legacy)$ ]]; then
            echo "::error::Invalid npm_tag input"
            exit 1
          fi

          if [[ ! "$GIT_RELEASE_TAG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?|@vkontakte/[A-Za-z0-9._-]+@[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?)$ ]]; then
            echo "::error::Invalid git_release_tag input"
            exit 1
          fi

          if [[ ! "$BRANCH" =~ ^(refs/heads/)?[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Invalid branch input"
            exit 1
          fi

          {
            printf 'package_name=%s\n' "$PACKAGE_NAME"
            printf 'npm_tag=%s\n' "$NPM_TAG"
            printf 'git_release_tag=%s\n' "$GIT_RELEASE_TAG"
            printf 'close_milestone=true\n'
            printf 'branch=%s\n' "$BRANCH"
          } >> "$GITHUB_OUTPUT"

  package_vkui_complete:
    needs: ['payload']
    if: ${{ success() && fromJson(needs.payload.outputs.close_milestone) == true && needs.payload.outputs.package_name == '@vkontakte/vkui' }}
    runs-on: ubuntu-slim
    name: Complete @vkontakte/vkui
    steps:
      - name: Close milestone, comment on issues and release notes
        uses: VKCOM/gh-actions/VKUI/complete-publish@main
        with:
          token: ${{ secrets.DEVTOOLS_GITHUB_TOKEN }}
          releaseTag: ${{ needs.payload.outputs.git_release_tag }}
          latest: ${{ needs.payload.outputs.npm_tag == 'latest' }}

  package_vkui_floating_ui_complete:
    needs: ['payload']
    if: ${{ success() && needs.payload.outputs.package_name == '@vkontakte/vkui-floating-ui' }}
    runs-on: ubuntu-slim
    name: Complete @vkontakte/vkui-floating-ui
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Node setup
        uses: ./.github/actions/node-setup

      - name: get vkui-floating-ui version from git release tag
        id: vkui_floating_ui_version
        env:
          GIT_RELEASE_TAG: ${{ needs.payload.outputs.git_release_tag }}
        run: |
          if [[ "$GIT_RELEASE_TAG" =~ ^@vkontakte/vkui-floating-ui@(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ "$GIT_RELEASE_TAG" =~ ^v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "::error::Invalid vkui-floating-ui release tag"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid vkui-floating-ui version"
            exit 1
          fi

          printf 'value=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      # Обновляем версию vkui-floating-ui в vkui
      - name: update vkui-floating-ui version in vkui
        env:
          VKUI_FLOATING_UI_VERSION: ${{ steps.vkui_floating_ui_version.outputs.value }}
        run: |
          yarn workspace @vkontakte/vkui add "@vkontakte/vkui-floating-ui@$VKUI_FLOATING_UI_VERSION"

      # Создаем pull request с изменениями в ветке
      - name: Create PR with changes
        id: create_pull_request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: ${{ needs.payload.outputs.branch }}
          commit-message: 'build(deps): Bump @vkontakte/vkui-floating-ui to ${{ steps.vkui_floating_ui_version.outputs.value }}'
          delete-branch: true
          title: 'build(deps): Bump @vkontakte/vkui-floating-ui to ${{ steps.vkui_floating_ui_version.outputs.value }}'
          body: ''
          labels: subpackage:@vkontakte/vkui-floating-ui, dependencies

      # Добавляем майлстоун следующей минорной версии
      - name: Add next minor version milestone to pull request
        uses: VKCOM/gh-actions/VKUI/add-next-minor-milestone@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull_request_number: ${{ steps.create_pull_request.outputs.pull-request-number }}
